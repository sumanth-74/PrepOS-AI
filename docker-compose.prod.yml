services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  frontend-proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
