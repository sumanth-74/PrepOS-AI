services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: prepos
      POSTGRES_PASSWORD: prepos
      POSTGRES_DB: prepos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prepos -d prepos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://prepos:prepos@postgres:5432/prepos
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python scripts/ensure_pgvector.py &&
             alembic upgrade head &&
             uvicorn prepos.api.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/alembic:/app/alembic:ro

  worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://prepos:prepos@postgres:5432/prepos
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A prepos.tasks.celery_app worker --loglevel=info -Q default,events,knowledge
    volumes:
      - ./backend/src:/app/src:ro

  beat:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://prepos:prepos@postgres:5432/prepos
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A prepos.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend/src:/app/src:ro

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./docker/frontend-placeholder:/usr/share/nginx/html:ro

volumes:
  postgres_data:
