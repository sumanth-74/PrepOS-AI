name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: prepos
          POSTGRES_PASSWORD: prepos
          POSTGRES_DB: prepos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://prepos:prepos@localhost:5432/prepos_test
      SECRET_KEY: ci-secret-key-for-prepos-backend-foundation-min-32
      CELERY_TASK_ALWAYS_EAGER: "true"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: MyPy
        run: mypy src
      - name: Tests
        run: pytest --cov=prepos --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: prepos
          POSTGRES_PASSWORD: prepos
          POSTGRES_DB: prepos_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://prepos:prepos@localhost:5432/prepos_e2e
      SECRET_KEY: ci-secret-key-for-prepos-backend-foundation-min-32
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      CELERY_TASK_ALWAYS_EAGER: "false"
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_API_ORIGIN: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Migrate and seed demo data
        working-directory: backend
        run: |
          alembic upgrade head
          python scripts/seed_demo_data.py
      - name: Start API and worker
        working-directory: backend
        run: |
          uvicorn prepos.api.main:app --host 127.0.0.1 --port 8000 &
          celery -A prepos.tasks.celery_app worker --loglevel=info -Q default,events &
          sleep 5
      - name: Install frontend and Playwright
        working-directory: apps/web
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Build and start frontend
        working-directory: apps/web
        run: |
          npm run build
          npm run start &
          npx wait-on http://127.0.0.1:3000 http://127.0.0.1:8000/health
      - name: Playwright smoke tests
        working-directory: apps/web
        run: npm run test:e2e

  docker-frontend:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000/api/v1 \
            -t prepos-web:ci \
            ./apps/web
