name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: prepos
          POSTGRES_PASSWORD: prepos
          POSTGRES_DB: prepos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://prepos:prepos@localhost:5432/prepos_test
      SECRET_KEY: ci-secret-key-for-prepos-backend-foundation-min-32
      CELERY_TASK_ALWAYS_EAGER: "true"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: MyPy
        run: mypy src
      - name: Tests
        run: pytest --cov=prepos --cov-report=term-missing
